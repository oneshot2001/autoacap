[package]
name = "autoacap"
version = "0.1.0"
edition = "2021"

[dependencies]
# Axis ACAP Rust wrappers
# These provide safe Rust bindings to Axis C APIs
# acap = { git = "https://github.com/AxisCommunications/acap-rs" }

# Serialization for metrics/detection output
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Time measurement
libc = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
